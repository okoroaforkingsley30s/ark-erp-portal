name: Repository CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '22'
  VITE_APP_ENV: ci
  VITE_SUPABASE_URL: https://ci-placeholder.supabase.co
  VITE_SUPABASE_ANON_KEY: ci-placeholder-anon-key

jobs:
  quality:
    name: Build, lint, types, tests and audit
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Validate migration sequence and safety
        run: npm run validate:migrations

      - name: Validate production security headers
        run: npm run validate:security-headers

      - name: Validate Electron startup and packaging configuration
        run: npm run validate:electron

      - name: Validate Android release configuration
        run: npm run validate:android

      - name: Lint
        run: npm run lint

      - name: Incremental type-check gate
        run: npm run typecheck

      - name: Unit tests and coverage thresholds
        run: npm run test:coverage

      - name: Dependency vulnerability audit
        run: npm audit --omit=dev --audit-level=high

      - name: Production build
        run: npm run build

      - name: Upload unit-test coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-coverage
          path: coverage/
          if-no-files-found: ignore
          retention-days: 7

  browser-tests:
    name: Browser journeys
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run desktop and mobile browser journeys
        run: npm run test:e2e

      - name: Upload browser failure evidence
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-failure-evidence
          path: |
            /tmp/ark-one-playwright-results/
            /tmp/ark-one-playwright-report/
          if-no-files-found: ignore
          retention-days: 7

  supabase-integration:
    name: Supabase integration tests (optional test project)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_TEST_URL: ${{ secrets.SUPABASE_TEST_URL }}
      SUPABASE_TEST_ANON_KEY: ${{ secrets.SUPABASE_TEST_ANON_KEY }}
      SUPABASE_TEST_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_TEST_SERVICE_ROLE_KEY }}
      ARK_ALLOW_REMOTE_INTEGRATION_TESTS: 'true'
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install locked dependencies
        run: npm ci

      - name: Run isolated Supabase integration tests
        if: env.SUPABASE_TEST_URL != '' && env.SUPABASE_TEST_ANON_KEY != '' && env.SUPABASE_TEST_SERVICE_ROLE_KEY != ''
        run: npm run test:integration

      - name: Explain skipped integration tests
        if: env.SUPABASE_TEST_URL == '' || env.SUPABASE_TEST_ANON_KEY == '' || env.SUPABASE_TEST_SERVICE_ROLE_KEY == ''
        run: echo "Supabase integration tests skipped because dedicated test-project secrets are not configured."
