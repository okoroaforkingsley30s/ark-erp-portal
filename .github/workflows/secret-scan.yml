name: Secret scanning

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: secrets-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    name: Gitleaks history scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out complete history
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan committed history for secrets
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
